appId: com.questboard.app
productName: Questboard
directories:
  buildResources: build
  output: release
files:
  - electron/dist/**/*
  - frontend/dist/**/*
  - "!**/*.ts"
  - "!**/*.map"
win:
  target:
    - nsis
    - portable
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: server/
    to: server/
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!.venv/**"
      - "!tests/**"
